<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Solgram is coming soon with a faster and smarter shopping experience.">
    <title>Solgram World | Coming Soon</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page">
      <main class="container">
        <section class="home-hero">
          <div class="hero-panel">
            <div class="single-visual" aria-label="Grocery visual">
              <img src="assets/van.png" alt="Solgram delivery van">
            </div>
            <img class="app-icon" src="assets/icon.png" alt="Solgram app icon">
            <img class="home-logo" src="assets/solgram-logo.svg" alt="Solgram">
            <p class="launch-line">Launching soon on</p>
            <div class="store-badges" aria-label="Store availability">
              <div class="store-badge">
                <span class="play-glyph" aria-hidden="true"></span>
                <span>Google Play</span>
              </div>
              <div class="store-badge">
                <span class="apple-glyph" aria-hidden="true"></span>
                <span>App Store</span>
              </div>
            </div>
            <p class="hero-note">Fresh groceries. Premium picks. Thoughtfully delivered.</p>
          </div>
        </section>
      </main>

      <footer>
        <div class="container footer-inner">
          <small>&copy; 2026 Solgram. All rights reserved.</small>
          <nav class="footer-links" aria-label="Footer links">
            <a href="index.html">Home</a>
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact Us</a>
          </nav>
        </div>
      </footer>
    </div>
  </body>
</html>

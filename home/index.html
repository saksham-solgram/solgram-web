<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Solgram — better choices, thoughtfully delivered.">
    <title>Solgram World</title>
    <link rel="stylesheet" href="../styles.css">
    <link rel="canonical" href="/home/">
  </head>
  <body class="body--landing">
    <div class="page page--landing">
      <main class="landing">
        <div class="landing__content">
          <img class="landing__logo" src="../assets/solgram-logo.svg" alt="Solgram" width="364" height="128">
          <h1 class="landing__tagline">
            <span class="landing__tagline-line">Better choices,</span>
            <span class="landing__tagline-line">thoughtfully delivered</span>
          </h1>
          <div class="landing__stores" aria-label="App stores coming soon">
            <img
              class="store-badge"
              src="../assets/ios_store_badge.svg"
              alt="Download on the App Store"
              width="366"
              height="114"
              decoding="async"
            >
            <img
              class="store-badge"
              src="../assets/android_store_badge.svg"
              alt="Get it on Google Play"
              width="366"
              height="114"
              decoding="async"
            >
          </div>
        </div>

        <div class="landing__illustration-wrap">
          <img
            class="landing__illustration landing__illustration--desktop"
            src="../assets/Desktop_website_illustration.png"
            alt=""
            width="1210"
            height="400"
            decoding="async"
          >
          <img
            class="landing__illustration landing__illustration--mobile"
            src="../assets/Mobile_website_illustration.png"
            alt=""
            width="1170"
            height="717"
            decoding="async"
          >
        </div>
      </main>
    </div>
  </body>
</html>

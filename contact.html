<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <meta name="description" content="Contact Solgram support and team.">
    <title>Contact Us | Solgram World</title>
    <link rel="stylesheet" href="styles.css">
  </head>
  <body>
    <div class="page">
      <main class="container content-page">
        <section class="paper">
          <div class="eyebrow">Get in touch</div>
          <h1>Contact Solgram</h1>
          <p>Submit your request and we will receive it at <strong>help@solgram.world</strong>.</p>

          <form action="https://formsubmit.co/help@solgram.world" method="post" class="form-grid">
            <input type="hidden" name="_subject" value="Solgram Website Contact Request">
            <input type="hidden" name="_captcha" value="false">
            <input type="hidden" name="_template" value="table">
            <label for="name">
              Name
              <input id="name" name="Name" type="text" autocomplete="name" required>
            </label>

            <label for="phone">
              Phone Number
              <input id="phone" name="Phone Number" type="tel" autocomplete="tel" required>
            </label>

            <label for="email">
              Email Address
              <input id="email" name="Email Address" type="email" autocomplete="email" required>
            </label>

            <label for="category">
              Issue Category
              <select id="category" name="Issue Category" required>
                <option value="">Select one option</option>
                <option>General Inquiry</option>
                <option>Support with an Order</option>
                <option>Account Deletion Request</option>
              </select>
            </label>

            <label for="message">
              Message
              <textarea id="message" name="Message" placeholder="Tell us how we can help..." required></textarea>
            </label>

            <button class="btn btn-primary" type="submit">Send Request</button>
            <p class="help-text">
              For direct support, you can also email us at
              <a href="mailto:help@solgram.world">help@solgram.world</a>.
            </p>
          </form>
        </section>
      </main>

      <footer>
        <div class="container footer-inner">
          <small>&copy; 2026 Solgram. All rights reserved.</small>
          <nav class="footer-links" aria-label="Footer links">
            <a href="/home/">Home</a>
            <a href="terms.html">Terms of Service</a>
            <a href="privacy.html">Privacy Policy</a>
            <a href="contact.html">Contact Us</a>
          </nav>
        </div>
      </footer>
    </div>
  </body>
</html>
